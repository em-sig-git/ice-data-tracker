name: ICE historical scrape

on:
  schedule:
    - cron: '7 9,21 * * *'
      timezone: 'Europe/Riga'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run historical scraper
        run: PYTHONPATH=src python -m ice_data_tracker.main --mode historical

      - name: Rebuild derived continuous datasets
        run: PYTHONPATH=src python -m ice_data_tracker.main --mode build_continuous

      - name: Commit and push updates
        run: |
          if git diff --quiet -- data logs; then
            echo "No changes to commit"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data logs
          git commit -m "Update ICE historical and derived data"
          git push
